<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elevate Cripto</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  font-family: Arial, sans-serif;
}

#player {
  width: 80%;
  max-width: 900px;
  height: 500px;
}

#cta {
  position: absolute;
  bottom: 80px;
  display: none;
  gap: 20px;
  flex-direction: column;
  align-items: center;
}

.btn {
  padding: 18px 35px;
  font-size: 18px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  width: 270px;
  text-align: center;
}

.whatsapp { background: #25D366; }
.telegram { background: #0088cc; }
</style>
</head>

<body>

<div id="player"></div>

<div id="cta">
  <a class="btn whatsapp" href="https://wa.me/18047572217" target="_blank">
    Contáctanos por WhatsApp
  </a>
  <a class="btn telegram" href="https://t.me/elevatecripto" target="_blank">
    Más información en Telegram
  </a>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    videoId: 'L3J5HtZTROs',
    events: {
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerStateChange(event) {
  if (event.data == YT.PlayerState.PLAYING) {
    setInterval(function() {
      let duration = player.getDuration();
      let current = player.getCurrentTime();

      if (duration - current <= 15) {
        document.getElementById("cta").style.display = "flex";
      }
    }, 1000);
  }
}
</script>

</body>
</html>
